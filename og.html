<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickman Team Battle Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 10px 16px;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
    z-index: 10; flex-wrap: wrap;
  }
  .spawn-btn {
    border: none; border-radius: 8px; padding: 8px 18px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    color: #fff; transition: transform .1s, box-shadow .15s;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
  .spawn-btn:hover { transform: scale(1.08); }
  .spawn-btn:active { transform: scale(0.96); }
  .spawn-btn.red    { background: #e74c3c; box-shadow: 0 0 10px #e74c3c88; }
  .spawn-btn.blue   { background: #3498db; box-shadow: 0 0 10px #3498db88; }
  .spawn-btn.green  { background: #2ecc71; box-shadow: 0 0 10px #2ecc7188; }
  .spawn-btn.yellow { background: #f1c40f; color: #333; box-shadow: 0 0 10px #f1c40f88; }
  .counter {
    color: #ccc; font-size: 13px; min-width: 24px; text-align: center;
    font-variant-numeric: tabular-nums;
  }
  #spawn-count {
    width: 52px; padding: 6px 8px; border: 1px solid #888; border-radius: 6px;
    background: rgba(255,255,255,0.1); color: #fff; font-size: 14px;
    text-align: center; margin-left: 8px;
    font-variant-numeric: tabular-nums;
  }
  #spawn-count:focus { outline: none; border-color: #aaa; background: rgba(255,255,255,0.15); }
  .ui-label { color: #aaa; font-size: 13px; }
  #spawn-all-btn {
    border: 1px solid #fff; border-radius: 8px; padding: 8px 16px;
    font-size: 14px; font-weight: 700; cursor: pointer; color: #fff;
    background: linear-gradient(135deg, #e74c3c, #3498db, #2ecc71, #f1c40f);
    margin-left: 6px; transition: transform .1s;
  }
  #spawn-all-btn:hover { transform: scale(1.08); }
  #spawn-all-btn:active { transform: scale(0.96); }
  #clear-btn {
    border: 1px solid #888; border-radius: 8px; padding: 8px 16px;
    font-size: 14px; cursor: pointer; color: #ccc; background: transparent;
    margin-left: 6px; transition: background .15s;
  }
  #pause-btn {
    border: 1px solid #888; border-radius: 8px; padding: 8px 16px;
    font-size: 14px; cursor: pointer; color: #ccc; background: transparent;
    margin-left: 6px; transition: background .15s;
  }
  #pause-btn:hover { background: rgba(255,255,255,0.1); }
  #pause-btn.active { background: rgba(255,165,0,0.25); border-color: orange; color: #fff; }
  #clear-btn:hover { background: rgba(255,255,255,0.1); }
</style>
</head>
<body>
<div id="ui">
  <button class="spawn-btn red" data-colour="red">+ Red</button>
  <span class="counter" id="count-red">0</span>
  <button class="spawn-btn blue" data-colour="blue">+ Blue</button>
  <span class="counter" id="count-blue">0</span>
  <button class="spawn-btn green" data-colour="green">+ Green</button>
  <span class="counter" id="count-green">0</span>
  <button class="spawn-btn yellow" data-colour="yellow">+ Yellow</button>
  <span class="counter" id="count-yellow">0</span>
  <span class="ui-label">×</span>
  <input type="number" id="spawn-count" value="1" min="1" max="100">
  <button id="spawn-all-btn">Spawn All</button>
  <button id="pause-btn">⏸ Pause</button>
  <button id="clear-btn">Clear All</button>
</div>
<canvas id="arena"></canvas>

<script>
// ─── Constants ───────────────────────────────────────────────────────
const COLOURS = {
  red:    { fill: '#e74c3c', stroke: '#c0392b' },
  blue:   { fill: '#3498db', stroke: '#2980b9' },
  green:  { fill: '#2ecc71', stroke: '#27ae60' },
  yellow: { fill: '#f1c40f', stroke: '#d4ac0f' },
};
const SPEED          = 1.6;
const FLEE_SPEED     = 2.2;
const CONTACT_RANGE  = 22;
const ATTACK_RANGE   = 20;
const ATTACK_CD      = 0.5;   // seconds
const DAMAGE         = 12;
const MAX_HP         = 100;
const SEPARATION     = 14;
const HEAD_R         = 6;
const BODY_H         = 18;
const LEG_H          = 14;
const ARM_LEN        = 12;
const HP_BAR_W       = 20;
const HP_BAR_H       = 3;
const UI_TOP_MARGIN  = 52;
const DEATH_FADE_DUR = 0.35;  // seconds

// ─── Canvas setup ────────────────────────────────────────────────────
const canvas = document.getElementById('arena');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ─── Entity model ────────────────────────────────────────────────────
let nextId = 0;
const stickmen  = [];   // alive
const corpses   = [];   // dying (fade-out)

function createStickman(colour) {
  const margin = 40;
  return {
    id:       nextId++,
    x:        margin + Math.random() * (canvas.width  - margin * 2),
    y:        UI_TOP_MARGIN + margin + Math.random() * (canvas.height - UI_TOP_MARGIN - margin * 2),
    vx:       0,
    vy:       0,
    colour,
    hp:       MAX_HP,
    maxHp:    MAX_HP,
    groupId:  null,
    state:    'idle',       // idle | moving | attacking | fleeing
    facing:   1,            // 1 right, -1 left
    target:   null,
    attackCD: 0,
    punchT:   0,            // animation timer
  };
}

// ─── Group tracking (rebuilt every frame) ────────────────────────────
let groups = {};  // groupId → Set of stickman ids

function rebuildGroups() {
  // Union-Find for same-colour stickmen within CONTACT_RANGE
  const parent = {};
  const find = (a) => { while (parent[a] !== a) { parent[a] = parent[parent[a]]; a = parent[a]; } return a; };
  const union = (a, b) => { parent[find(a)] = find(b); };

  for (const s of stickmen) parent[s.id] = s.id;

  for (let i = 0; i < stickmen.length; i++) {
    for (let j = i + 1; j < stickmen.length; j++) {
      const a = stickmen[i], b = stickmen[j];
      if (a.colour !== b.colour) continue;
      const dx = a.x - b.x, dy = a.y - b.y;
      if (dx * dx + dy * dy < CONTACT_RANGE * CONTACT_RANGE * 4) {
        union(a.id, b.id);
      }
    }
  }

  groups = {};
  for (const s of stickmen) {
    const root = find(s.id);
    s.groupId = root;
    if (!groups[root]) groups[root] = new Set();
    groups[root].add(s.id);
  }
}

function groupSize(s) {
  return groups[s.groupId] ? groups[s.groupId].size : 1;
}

// ─── AI & movement ──────────────────────────────────────────────────
function updateAI(dt) {
  for (const s of stickmen) {
    // Find nearest enemy
    let nearestEnemy = null, nearDist = Infinity;
    for (const o of stickmen) {
      if (o.colour === s.colour) continue;
      const dx = o.x - s.x, dy = o.y - s.y;
      const d  = Math.sqrt(dx * dx + dy * dy);
      if (d < nearDist) { nearDist = d; nearestEnemy = o; }
    }

    if (!nearestEnemy) {
      s.state = 'idle'; s.vx = 0; s.vy = 0;
      continue;
    }

    // Flee check: enemy group > 2× own group
    const mySize    = groupSize(s);
    const enemySize = groupSize(nearestEnemy);
    if (enemySize > mySize * 2) {
      s.state = 'fleeing';
      const dx = s.x - nearestEnemy.x, dy = s.y - nearestEnemy.y;
      const d  = Math.sqrt(dx * dx + dy * dy) || 1;
      s.vx = (dx / d) * FLEE_SPEED;
      s.vy = (dy / d) * FLEE_SPEED;
      s.facing = s.vx >= 0 ? 1 : -1;
      continue;
    }

    // Move toward nearest enemy
    if (nearDist > ATTACK_RANGE) {
      s.state = 'moving';
      const dx = nearestEnemy.x - s.x, dy = nearestEnemy.y - s.y;
      const d  = Math.sqrt(dx * dx + dy * dy) || 1;
      s.vx = (dx / d) * SPEED;
      s.vy = (dy / d) * SPEED;
      s.facing = s.vx >= 0 ? 1 : -1;
    } else {
      // In attack range
      s.state = 'attacking';
      s.target = nearestEnemy;
      s.vx = 0; s.vy = 0;
      s.facing = nearestEnemy.x >= s.x ? 1 : -1;
    }
  }

  // Separation force between allies
  for (let i = 0; i < stickmen.length; i++) {
    for (let j = i + 1; j < stickmen.length; j++) {
      const a = stickmen[i], b = stickmen[j];
      if (a.colour !== b.colour) continue;
      const dx = a.x - b.x, dy = a.y - b.y;
      const d  = Math.sqrt(dx * dx + dy * dy) || 0.1;
      if (d < SEPARATION) {
        const push = (SEPARATION - d) * 0.3;
        const nx = dx / d, ny = dy / d;
        a.vx += nx * push; a.vy += ny * push;
        b.vx -= nx * push; b.vy -= ny * push;
      }
    }
  }

  // Apply velocities & clamp to bounds
  for (const s of stickmen) {
    s.x += s.vx;
    s.y += s.vy;
    s.x = Math.max(HEAD_R + 2, Math.min(canvas.width  - HEAD_R - 2, s.x));
    s.y = Math.max(UI_TOP_MARGIN + HEAD_R + 2, Math.min(canvas.height - LEG_H - 2, s.y));
  }
}

// ─── Combat ──────────────────────────────────────────────────────────
function updateCombat(dt) {
  for (const s of stickmen) {
    s.attackCD = Math.max(0, s.attackCD - dt);
    s.punchT   = Math.max(0, s.punchT - dt);

    if (s.state === 'attacking' && s.target && s.attackCD <= 0) {
      const t = s.target;
      if (t.hp > 0) {
        t.hp -= DAMAGE;
        s.attackCD = ATTACK_CD;
        s.punchT   = 0.15;
      }
    }
  }

  // Remove dead stickmen
  for (let i = stickmen.length - 1; i >= 0; i--) {
    if (stickmen[i].hp <= 0) {
      const dead = stickmen.splice(i, 1)[0];
      dead.fadeT = DEATH_FADE_DUR;
      corpses.push(dead);
    }
  }

  // Fade corpses
  for (let i = corpses.length - 1; i >= 0; i--) {
    corpses[i].fadeT -= dt;
    if (corpses[i].fadeT <= 0) corpses.splice(i, 1);
  }
}

// ─── Rendering ───────────────────────────────────────────────────────
function drawStickman(s, alpha) {
  const { x, y, colour, facing, punchT, hp, maxHp } = s;
  const c = COLOURS[colour];
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';

  const headY = y - BODY_H - HEAD_R;
  const bodyBot = y;

  // Legs (slight walk sway)
  const t = performance.now() / 200;
  const legSway = (s.state === 'moving' || s.state === 'fleeing') ? Math.sin(t + s.id) * 5 : 0;
  ctx.strokeStyle = c.stroke;
  ctx.lineWidth   = 2.5;
  ctx.beginPath(); ctx.moveTo(x, bodyBot); ctx.lineTo(x - 5 + legSway, bodyBot + LEG_H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, bodyBot); ctx.lineTo(x + 5 - legSway, bodyBot + LEG_H); ctx.stroke();

  // Body
  ctx.strokeStyle = c.fill;
  ctx.lineWidth   = 3;
  ctx.beginPath(); ctx.moveTo(x, headY + HEAD_R); ctx.lineTo(x, bodyBot); ctx.stroke();

  // Arms
  const shoulderY = headY + HEAD_R + 5;
  if (punchT > 0) {
    // Punching arm (forward)
    ctx.beginPath();
    ctx.moveTo(x, shoulderY);
    ctx.lineTo(x + facing * ARM_LEN * 1.3, shoulderY - 2);
    ctx.stroke();
    // Other arm back
    ctx.beginPath();
    ctx.moveTo(x, shoulderY);
    ctx.lineTo(x - facing * ARM_LEN * 0.6, shoulderY + 6);
    ctx.stroke();
  } else {
    const armSway = (s.state === 'moving' || s.state === 'fleeing') ? Math.sin(t + s.id) * 4 : 0;
    ctx.beginPath();
    ctx.moveTo(x, shoulderY);
    ctx.lineTo(x - ARM_LEN * 0.6, shoulderY + 8 + armSway);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, shoulderY);
    ctx.lineTo(x + ARM_LEN * 0.6, shoulderY + 8 - armSway);
    ctx.stroke();
  }

  // Head
  ctx.fillStyle = c.fill;
  ctx.beginPath();
  ctx.arc(x, headY, HEAD_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = c.stroke;
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  // HP bar (skip if full)
  if (hp < maxHp) {
    const hpRatio = Math.max(0, hp / maxHp);
    const barX = x - HP_BAR_W / 2;
    const barY = headY - HEAD_R - 7;
    ctx.fillStyle = '#444';
    ctx.fillRect(barX, barY, HP_BAR_W, HP_BAR_H);
    // Gradient: green → yellow → red
    const r = Math.round(255 * (1 - hpRatio));
    const g = Math.round(255 * hpRatio);
    ctx.fillStyle = `rgb(${r},${g},50)`;
    ctx.fillRect(barX, barY, HP_BAR_W * hpRatio, HP_BAR_H);
  }

  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ground
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid dots for depth
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let gx = 0; gx < canvas.width; gx += 40) {
    for (let gy = UI_TOP_MARGIN; gy < canvas.height; gy += 40) {
      ctx.fillRect(gx, gy, 2, 2);
    }
  }

  // Draw corpses (fading)
  for (const c of corpses) {
    drawStickman(c, c.fadeT / DEATH_FADE_DUR * 0.6);
  }

  // Draw alive stickmen
  for (const s of stickmen) {
    drawStickman(s, 1);
  }

  // Update counters
  const counts = { red: 0, blue: 0, green: 0, yellow: 0 };
  for (const s of stickmen) counts[s.colour]++;
  for (const col of Object.keys(counts)) {
    document.getElementById('count-' + col).textContent = counts[col];
  }
}

// ─── Game loop ───────────────────────────────────────────────────────
let lastTime = performance.now();
let paused = false;

function gameLoop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  if (!paused) {
    rebuildGroups();
    updateAI(dt);
    updateCombat(dt);
  }
  render();

  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

// ─── Pause button ───────────────────────────────────────────────────
const pauseBtn = document.getElementById('pause-btn');
pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.textContent = paused ? '▶ Resume' : '⏸ Pause';
  pauseBtn.classList.toggle('active', paused);
});

// ─── Helpers ─────────────────────────────────────────────────────────
function getSpawnCount() {
  const val = parseInt(document.getElementById('spawn-count').value, 10);
  return Math.max(1, Math.min(100, isNaN(val) ? 1 : val));
}

function spawnColour(colour) {
  const n = getSpawnCount();
  for (let i = 0; i < n; i++) stickmen.push(createStickman(colour));
}

// ─── Spawn buttons ──────────────────────────────────────────────────
document.querySelectorAll('.spawn-btn').forEach(btn => {
  btn.addEventListener('click', () => spawnColour(btn.dataset.colour));
});

document.getElementById('spawn-all-btn').addEventListener('click', () => {
  for (const col of ['red', 'blue', 'green', 'yellow']) spawnColour(col);
});

document.getElementById('clear-btn').addEventListener('click', () => {
  stickmen.length = 0;
  corpses.length  = 0;
});
</script>
</body>
</html>
